{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header">
            Add Payment
        </div>

        <div class="card-body">

            <h5>
                {{ debt.person_name }}
            </h5>

            <p>
                Remaining Amount:
                ₹ {{ debt.remaining_amount }}
            </p>

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button
                    class="btn btn-primary">

                    Save Payment

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
