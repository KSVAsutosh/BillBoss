{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header">
            <h3>Profile</h3>
        </div>

        <div class="card-body">

            <form
                method="POST"
                enctype="multipart/form-data">

                {% csrf_token %}

                {{ user_form.as_p }}
                {{ profile_form.as_p }}

                <button
                    class="btn btn-primary">

                    Update Profile

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
