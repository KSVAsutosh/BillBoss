{% extends 'base.html' %}

{% block title %}
Dashboard
{% endblock %}

{% block content %}

<div class="container mt-4">

    <h2>Welcome {{ request.user.username }}</h2>

    <div class="row mt-4">

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body">

                    <h5>Income</h5>

                    <h3>₹ {{ income }}</h3>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body">

                    <h5>Expense</h5>

                    <h3>₹ {{ expense }}</h3>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body">

                    <h5>Balance</h5>

                    <h3>₹ {{ balance }}</h3>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
