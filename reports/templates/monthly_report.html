{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2>Monthly Report</h2>

    <div class="card shadow">

        <div class="card-body">

            <table class="table table-striped">

                <thead>
                    <tr>
                        <th>Month</th>
                        <th>Total Amount</th>
                    </tr>
                </thead>

                <tbody>

                {% for item in monthly_data %}

                    <tr>
                        <td>{{ item.month }}</td>
                        <td>₹ {{ item.total }}</td>
                    </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
