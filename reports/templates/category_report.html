{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2>Category Report</h2>

    <div class="card shadow">

        <div class="card-body">

            <table class="table table-hover">

                <thead>

                    <tr>
                        <th>Category</th>
                        <th>Total Expense</th>
                    </tr>

                </thead>

                <tbody>

                {% for item in category_data %}

                    <tr>
                        <td>{{ item.category__name }}</td>
                        <td>₹ {{ item.total }}</td>
                    </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
